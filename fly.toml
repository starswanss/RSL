# Fly.io config — RSL (SQLite + persistent volume)
# แก้ app ให้เป็นชื่อที่ตั้งตอน `fly launch` (ต้องไม่ซ้ำใคร)
app = "rsl-esports"
primary_region = "sin"          # สิงคโปร์ = ใกล้ไทยสุด

[build]

[env]
  PORT = "3000"
  DATABASE_URL = "file:/data/prod.db"   # ไฟล์ DB อยู่บน volume ที่ถาวร

# volume ถาวรสำหรับเก็บ SQLite (ข้อมูลไม่หายตอน deploy ใหม่)
[[mounts]]
  source = "rsl_data"
  destination = "/data"

[http_service]
  internal_port = 3000
  force_https = true
  # SQLite ใช้ได้เครื่องเดียวเท่านั้น — ห้าม scale เกิน 1
  auto_stop_machines = "off"
  auto_start_machines = true
  min_machines_running = 1

[[vm]]
  size = "shared-cpu-1x"
  memory = "512mb"
